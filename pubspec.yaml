name: flutter_application_pasarela
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.15.0
  http: ^1.6.0
  provider: ^6.1.5+1
  image_picker: ^1.1.2
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# ── Launcher icon ────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/ic_launcher.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icon/ic_launcher.png"
  web:
    generate: false

# ── Native splash ────────────────────────────────────────────────────────────
flutter_native_splash:
  color: "#FFFFFF"                          # fondo blanco
  image: assets/splash/splash_branding.png  # marca S centrada (1080×1080)
  color_dark: "#0A0A0A"
  image_dark: assets/splash/splash_branding_dark.png
  android_12:
    image: assets/splash/splash_icon.png    # 288×288 para Android 12 splash API
    color: "#FFFFFF"
    color_dark: "#0A0A0A"
  fullscreen: false

# ── Flutter ───────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/icon/ic_launcher.png
    - assets/splash/splash_branding.png
    - assets/splash/splash_icon.png